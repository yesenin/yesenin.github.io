<style>
	label { margin-left: 20px; }
</style>
<script>
	var state = [];
	var sign = '';

	var fillResult = function() {
		var result = '';
	    for(var i = 0; i < state.length; i++) {
	    	result += $('label[for="'+ state[i] +'"]').text();
	    	if (i > 0) {
	    		result += ' ';
	    	}
	    }
	    result += ' Всегда ваш — ' + sign;
	    $('#result').text(result);
	    state = [];
	}

	$(document).ready(function() {
		$(document).on('click', 'input[type="checkbox"]', function() {
			var id = $(this).attr('id');
		    if ($(this).is(':checked')) {
		        state.push(id);
		    } else {
		    	var foo = state.indexOf(id);
		        state.splice(foo, 1);
		    }
		    
		});
		$(document).on('focusout', 'input[type="textbox"]', function() {
			sign = $(this).val();
		});
		$(document).on('click', 'button', function() {
			fillResult();
		});
	});
</script>
