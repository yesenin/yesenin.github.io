<style>
	body { background-color: #f3d0bd; font-family: 'PT Serif', serif; }

	a:hover {text-decoration: none; border-bottom: 1px solid #339; color: #339;}
	hr { border-top: 1px solid #000; }
	label { margin-left: 10px; font-weight: normal; font-size: 12pt; display: inline; }

	li { padding-left: 5px; }

	#photoModal .modal-dialog  {width:900px;}{
    /* new custom width */
    width: 820px;
    /* must be half of the width, minus scrollbar on the left (30px) */
}
</style>
<script>
	var state = [];
	var sign = '';
	var yours = 'Всегда ваш — ';
	var cb17 = 'Вчера я видѣла вас во снѣ.',
	cb21 = 'Оштрафована за ношеніе ножа.',
	cb22 = 'Оштрафована за ношеніе вилки.',
	cb26 = 'Продулась в прах.',
	cb43 = 'Облил сѣрной кислотой.',
	cb51 = 'Поступил в авіаторы.',
	cb52 = 'Поступил в экспропріаторы.';
	var fillResult = function() {
		var result = '';
	    for(var i = 0; i < state.length; i++) {
	    	result += $('label[for="'+ state[i] +'"]').text();
	    	result += ' ';
	    }
	    if (sign.trim().length > 0) {
	    	result += yours + sign + '.';
		}
		if (result.length > 0) {
	    	$('#result').text(result);
	    	state = [];
	    	$('input[type="checkbox"]').attr('checked', false);
	    	return true;
		}
		return false;
	}

	$(document).ready(function() {
		$('label[for="tb1"]').text(yours);
		$('#yoursModal').modal('toggle');
		$('#male').click(function() {
			$('#yoursModal').modal('hide');
		});
		$('#female').click(function() {
			yours = "Всегда ваша — ";
			$('label[for="cb17"]').text(cb17);
			$('label[for="cb21"]').text(cb21);
			$('label[for="cb22"]').text(cb22);
			$('label[for="cb26"]').text(cb26);
			$('label[for="cb43"]').text(cb43);
			$('label[for="сb51"]').text(cb51);
			$('label[for="сb52"]').text(cb52);
			$('label[for="tb1"]').text(yours);
			$('#yoursModal').modal('hide');
		});
		$(document).on('click', 'input[type="checkbox"]', function() {
			var id = $(this).attr('id');
		    if ($(this).is(':checked')) {
		        state.push(id);
		    } else {
		    	var foo = state.indexOf(id);
		        state.splice(foo, 1);
		    }
		    
		});
		$(document).on('focusout', 'input[type="textbox"]', function() {
			sign = $(this).val();
		});
		$('#manual').click(function() {
			if (fillResult()) {
				$('#myModal').modal('toggle')
			}
		});
		$(document).on('click', '.auto', function() {
			state = []
			var b = Math.floor((Math.random() * 5) + 1);
			for (var i = 0; i < 2 + b; i++) {
				var a = Math.floor((Math.random() * 54) + 1);
				if (state.indexOf('cb' + a) < 0) {
					state.push('cb' + a);
				}
			}
			fillResult();
			$('#myModal').modal('show')
		});
	});
</script>
