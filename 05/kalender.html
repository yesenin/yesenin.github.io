<html>
<head>
<title>Kalender</title>
<style>
body { background-color: #000; font-family: sans-serif; color: #33CC33 }
span {font-size: 50pt; position: absolute;}
.weekday {-webkit-filter: blur(2px); font-size: 30pt;}
.day {-webkit-filter: blur(1px); font-size: 40pt;}
.month {-webkit-filter: blur(0px); font-size: 50pt;}
.minutes {-webkit-filter: blur(1px); font-size: 30pt;}
.sep {-webkit-filter: blur(1px); font-size: 40pt;}
.hour {-webkit-filter: blur(3px); font-size: 20pt;}
</style>
</head>
<body>
<p>
<span class="weekday" style="top: 30px; left: 80px;">tisdag</span>
<span class="day" style="top: 30px; left: 200px;">nittionde</span>
<span class="month" style="top: 30px; left: 500px;">maj</span>
<span class="minutes" style="top: 150px; left: 100px;">sju</span>
<span class="sep" style="top: 200px; left: 250px;">över</span>
<span class="hour" style="top: 300px; left: 400px;">nio</span>
</p>
</body>
</html>
