<!doctype html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=2.0">
	<title>Кукушка</title>
	<script src="https://code.jquery.com/jquery-3.3.1.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
	<style type="text/css">
		i {
			font-size: 80%;
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="row">
			
		</div>
		<div class="row">
			<div id="my-list" class="container">
			</div>
		</div>
	</div>
<script>
	const dict = [0, 31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];

	var getDiff = function(begin, end) {
	    var totalDays = 0;
	    var totalYears = 0;
	    var totalMonths = 0;
	    
	    var m = begin.month;
	    var y = begin.year;
	    
	    while (true) {
	        if (y == end.year && m == end.month) break;
	        totalDays += dict[m];
	        if (((y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0)) && m === 2)
	        {
	            totalDays++;
	        }
	        m++;
	        totalMonths++;
	        if (m > 12 && y < end.year)
	        {
	            m = 1;
	            y++;
	        }
	        if (m == begin.month && y > begin.year)
	        {
	            totalYears++;
	        }
	    }
	    var dayDiff = end.day - begin.day;
	    totalDays += dayDiff;
	    if (dayDiff < 0) totalMonths--;
	    return {
	        totalYears,
	        totalMonths,
	        totalDays,
	        days: Math.abs(dayDiff)
	    };
	}
	var min = 20000;
	var max = 15000;

	var getYearWord = function(val) {
		if (val === 0) return "";
		var r = val % 10;
		if (r === 1 ) return val + " год ";
		if (r < 5 ) return val + " года ";
		return val + " лет ";
	}

	var getMonthWord = function(val) {
		if (val === 0) return "";
		if (val > 10 && val < 20) return val + " месяцев ";
		var r = val % 10;
		if (r === 1 ) return val + " месяц ";
		if (r < 5 ) return val + " месяца ";
		return val + " месяцев ";
	}

	var getDayWord = function(val) {
		if (val === 0) return "";
		if (val > 10 && val < 20) return val + " дней ";
		var r = val % 10;
		if (r === 1 ) return val + " день ";
		if (r < 5 ) return val + " дня ";
		return val + " дней ";
	}

	var renderBlock = function(items, caption) {
		$('#my-list').append('<div class="row"><h3>' + caption + '</h3></div>');
		for(var i = 0; i < items.length; i++)
		{
			var begin = {
				year: items[i].birth.year,
				month: items[i].birth.month,
				day: items[i].birth.day
			};
			var end = {};
			if (items[i].death == null) {
				var now = new Date();
				end = {
					year: now.getFullYear(),
					month: now.getMonth() + 1,
					day: now.getDate()
				}
			} else {
				end = {
					year: items[i].death.year,
					month: items[i].death.month,
					day: items[i].death.day
				};
			}
			var diff = getDiff(begin, end);
			var percent = 100 * (diff.totalDays - min) / max;
			var bar = '<div class="progress">' + 
  					'<div class="progress-bar progress-bar-' + (items[i].death == null ? 'success' : 'danger' ) + '" role="progressbar" aria-valuenow="' + percent + '"' +
  					'aria-valuemin="0" aria-valuemax="100" style="width: ' + percent + '%">' +
  					'</div></div>';

			$('#my-list').append('<div class="row"><div class="col-sm-6 col-lg-3"><a href="' + items[i].href + '">' + items[i].name + (items[i].death == null ? '</a>' : '</a> &#8224;') + '</br><i>' +
				getYearWord(diff.totalYears) + getMonthWord(diff.totalMonths % 12) + getDayWord(diff.days) + '</i></div><div class="col-sm-12 col-lg-9">' + bar + '</div></div>');
		}
	}
	var raw_data = {};
	
	$.getJSON('https://gist.githubusercontent.com/yesenin/bfe1c73dbc5c1976efdc0419c2494c55/raw/4a65016948639544e0e8a13225a7422f33d4dcb5/howlong', function(data) {

		renderBlock(data.presidents, '');
		renderBlock(data.others, 'Прочие');
		renderBlock(data.secretaries, 'Генсеки');
		renderBlock(data.politburo, 'Политбюро');
	});


	//console.log(raw_data);
</script>
</body>
</html>
