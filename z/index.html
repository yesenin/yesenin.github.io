<!doctype html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<title>Кому, от кого и сколько</title>
	<link href='https://fonts.googleapis.com/css?family=PT+Sans&subset=latin,cyrillic' rel='stylesheet' type='text/css'>
	<link rel="stylesheet" type="text/css" href="main.css"/>
</head>
<body>
<div data-bind="foreach: rivalList" class="rival">
	<h2 data-bind="text: rival" ></h2>
	<div>
		<div class="foo">
			<div class="bar left scored" data-bind="style: {width: scoredWidth}, text: scored"></div>
		</div>
		<div class="foo">
			<div class="bar right conceded" data-bind="style: {width: concededWidth}, text: conceded"></div>
		</div>
	</div>
	<div>
		Дома
	</div>
	<div>
		<div class="foo">
			<div class="smallBar left scored" data-bind="style: {width: weHometWidth}, text: homeScored"></div>
		</div>
		<div class="foo">
			<div class="smallBar right conceded" data-bind="style: {width: theyGuestWidth}, text: homeConceded"></div>
		</div>
	</div>
	<div data-bind="{foreach: homeResult}">
		<div></div>
	</div>
	<div>
		В гостях
	</div>
	<div>
		<div class="foo">
			<div class="smallBar left scored" data-bind="style: {width: weGuestWidth}, text: guestScored"></div>
		</div>
		<div class="foo">
			<div class="smallBar right conceded" data-bind="style: {width: theyHomeWidth}, text: guestConceded"></div>
		</div>
	</div>
	<div data-bind="{foreach: guestResult}">
		<div></div>
	</div>
</div>
<script src="https://code.jquery.com/jquery-2.1.4.min.js" type="text/javascript"></script>
<script src="http://ajax.aspnetcdn.com/ajax/knockout/knockout-3.3.0.js" type="text/javascript"></script>
<script src="main.js" type="text/javascript" type="text/javascript"></script>
</body>
</html>
