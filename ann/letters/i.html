<html>
<head>
</head>
    <body>
        <canvas id="letter" width="800" height="700"/>
        <script>
            var canvas = document.getElementById('letter');
            var ctx = canvas.getContext('2d');
            
            var length = 450;
            var length_9 = 50;
            
            var shiftX = length_9 + 0.5;
            var shiftY = length_9 + 0.5;
            
            var point = function(x, y) {
                return {
                    x: x,
                    y: y,
                    circle: function(r) {
                        return circle(this, r);
                    }
                }
            }
            
            var line = function(a, b) {
                return {
                    a: a,
                    b: b,
                    draw: function(ctx) {
                        ctx.beginPath();
                        ctx.moveTo(a.x + shiftX, a.y + shiftY);
                        ctx.lineTo(b.x + shiftX, b.y + shiftY);
                        ctx.stroke();
                        ctx.closePath();
                    },
                    bisect: function() {
                        return point(Math.min(a.x, a.y) + Math.abs(a.x - b.x)/2, Math.min(a.y, b.y) + Math.abs(a.y - b.y)/2)
                    }
                }
            }
            
            var sgn = function(x) {
                if (x < 0) return -1;
                return 1;
            }
            
            var circle = function(p, r) {
                return {
                    p: p,
                    r: r,
                    draw: function(ctx) {
                        ctx.beginPath();
                        ctx.arc(p.x + shiftX, p.y + shiftY, r, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.closePath();
                    },
                    intersect: function(l) {
                        var x1 = l.a.x - this.p.x;
                        var y1 = l.a.y - this.p.y;
                        var x2 = l.b.x - this.p.x;
                        var y2 = l.b.y - this.p.y;
                        
                        var dx = x2 - x1;
                        var dy = y2 - y1;
                        var dr = Math.sqrt(dx * dx + dy * dy);
                        var D = x1 * y2 - x2 * y1;
                        
                        var dis = r * r * dr * dr - D * D;
                        if (dis > 0) {
                            var x = [(D * dy + sgn(dy) * dx * Math.sqrt(dis)) / (dr * dr), (D * dy - sgn(dy) * dx * Math.sqrt(dis)) / (dr * dr)];

                            var y = [(-D * dx + Math.abs(dy) * dx * Math.sqrt(dis)) / (dr * dr), (-D * dx - Math.abs(dy) * dx * Math.sqrt(dis)) / (dr * dr)];

                            return [point(x[0] + p.x, y[0] + p.y), point(x[1] + p.x, y[1] + p.y)];
                        }
                        if (dis == 0) {
                            var x = (D * dy) / (dr * dr);

                            var y = (-D * dx) / (dr * dr);

                            return point(x + p.x, y + p.y);
                        }
                        if (dis < 0) {
                            return null;
                        }
                    }
                }
            }
            
            var q = function(c, l1, l2) {
                var p1 = c.intersect(l1);
                var p2 = c.intersect(l2);
                var l = line(p1, p2);
                return l;
            }
            
            var letterI = function() {
            
            var A = point(0, 0);
            var B = point(length, 0);
            var C = point(0, length);
            var D = point(length, length);
            
            var AB = line(A, B);
            var CD = line(C, D);
            var BD = line(B, D);
            var AC = line(A, C);

            AB.draw(ctx);
            AC.draw(ctx);
            BD.draw(ctx);
            CD.draw(ctx);
            
            var E = AB.bisect();
            var F = CD.bisect();
            
            var EF = line(E, F);
            EF.draw(ctx);
            
            var GEH = E.circle(length_9 / 2);
            var IFJ = F.circle(length_9 / 2);
            GEH.draw(ctx);
            IFJ.draw(ctx);
            
            var foo = GEH.intersect(AB);
            var bar = IFJ.intersect(CD);
            
            var G = foo[1];
            var I = bar[1];
            var GI = line(G, I);
            GI.draw(ctx);

            var H = foo[0];
            var J = bar[0];
            var HJ = line(H, J);
            HJ.draw(ctx);
            
            // ---
            
            var K = point(G.x - length_9 / 2, G.y + length_9 / 2);
            var L = point(H.x + length_9 / 2, H.y + length_9 / 2);
            var M = point(I.x - length_9 / 2, I.y - length_9 / 2);
            var N = point(J.x + length_9 / 2, J.y - length_9 / 2);
            
            // --
            
            var cK = circle(K, length_9/2);
            cK.draw(ctx);

            var cL = circle(L, length_9/2);
            cL.draw(ctx);
            
            var cM = circle(M, length_9/2);
            cM.draw(ctx);
            
            var cN = circle(N, length_9/2);
            cN.draw(ctx);
            
            
            
            var a0 = q(cL, AB, HJ);
            var a1 = q(cK, AB, GI);
            var a2 = q(cM, CD, GI);
            var a3 = q(cN, CD, HJ);
            
            // --
            
            ctx.globalAlpha=0.5;
            ctx.beginPath();
            ctx.moveTo(a0.a.x + shiftX, a0.a.y + shiftY);
            ctx.lineTo(a1.a.x + shiftX, a1.a.y + shiftY);
            ctx.arc(K.x + shiftX, K.y + shiftY, length_9/2, Math.PI*1.5, Math.PI*2);
            ctx.lineTo(a2.b.x + shiftX, a2.b.y + shiftY);
            ctx.arc(M.x + shiftX, M.y + shiftY, length_9/2, 0, Math.PI/2);
            ctx.lineTo(a3.a.x + shiftX, a3.a.y + shiftY);
            ctx.arc(N.x + shiftX, N.y + shiftY, length_9/2, Math.PI/2, Math.PI);
            ctx.lineTo(a0.b.x + shiftX, a0.b.y + shiftY);
            ctx.arc(L.x + shiftX, L.y + shiftY, length_9/2, Math.PI, Math.PI*1.5);
            ctx.fill();
            }
            
            var letterJ = function() {
            
            var A = point(0, 0);
            var B = point(length, 0);
            var C = point(0, length);
            var D = point(length, length);
            
            var AB = line(A, B);
            var CD = line(C, D);
            var BD = line(B, D);
            var AC = line(A, C);

            AB.draw(ctx);
            AC.draw(ctx);
            BD.draw(ctx);
            CD.draw(ctx);
            
            var E = AB.bisect();
            var F = CD.bisect();
            
            var EF = line(E, F);
            //EF.draw(ctx);
            
            var GEH = E.circle(length_9 / 2);
            var IFJ = F.circle(length_9 / 2);
            //GEH.draw(ctx);
            //IFJ.draw(ctx);
            
            var foo = GEH.intersect(AB);
            var bar = IFJ.intersect(CD);
            
            var G = foo[1];
            var I = bar[1];
            var GI = line(G, I);
            //GI.draw(ctx);

            var H = foo[0];
            var J = bar[0];
            var HJ = line(H, J);
            //HJ.draw(ctx);
            
            // ---
            
            var K = point(G.x - length_9 / 2, G.y + length_9 / 2);
            var L = point(H.x + length_9 / 2, H.y + length_9 / 2);
            
            // --
            
            var cK = circle(K, length_9/2);
            //cK.draw(ctx);

            var cL = circle(L, length_9/2);
            //cL.draw(ctx);
                
            var CMN = circle(point(C.x + length_9/2, C.y), length_9/2);
            //CMN.draw(ctx);
                var PCN = circle(C, length_9);
               // PCN.draw(ctx);
                var O = point(C.x, C.y - length_9);
                var cO = circle(O, length_9 * 5);
                //cO.draw(ctx);
                var P = point(C.x - length_9, C.y);
                var cP = circle(P, length_9 * 5);
                //cP.draw(ctx);
                
                var a0 = q(cL, AB, HJ);
            var a1 = q(cK, AB, GI);

                //ctx.globalAlpha=0.5;
            ctx.beginPath();
            ctx.moveTo(a0.a.x + shiftX, a0.a.y + shiftY);
            ctx.lineTo(a1.a.x + shiftX, a1.a.y + shiftY);
            ctx.arc(K.x + shiftX, K.y + shiftY, length_9/2, Math.PI*1.5, Math.PI*2);
            ctx.lineTo(I.x + shiftX, I.y + shiftY);
            ctx.arc(P.x + shiftX, P.y + shiftY, length_9 * 5, 0, 0.65);
            ctx.arc(O.x + shiftX, O.y + shiftY, length_9 * 5, 0.8, 0, true);
            ctx.lineTo(a0.b.x + shiftX, a0.b.y + shiftY);
            ctx.arc(L.x + shiftX, L.y + shiftY, length_9/2, Math.PI, Math.PI*1.5);
            ctx.fill();
            }
            
            var handstroke = function(l) {
                ctx.beginPath();
                ctx.moveTo(l.a.x + shiftX, l.a.y + shiftY);
                ctx.lineTo(l.b.x + shiftX, l.b.y + shiftY);
                ctx.stroke();
            }
            
            var handI = function() {
                var hx = 550;
                var w = 50;
                for (var i = 0; i < 50; i++ ) {
                    var t = Math.sqrt(50 - i*i);
                    var a = line(point(hx + t, i), point(hx + t + w, i));
                    handstroke(a);
                }
                /*
                for (var i = 50; i < 400; i++ ) {
                    var a = line(point(hx + 50, i), point(hx + w + 50, i));
                    handstroke(a);
                }
                
                for (var i = 400; i < 450; i++ ) {
                    var a = line(point(hx + 50 + (i - 400), i), point(hx + (i - 400) + w + 50, i));
                    handstroke(a);
                }
                */
            }
            
            letterJ();
            //handI();
            
        </script>
    </body>
</html>
