<!doctype html>
<html>
<head>
<title>EPL tables</title>
<link href="https://fonts.googleapis.com/css?family=PT+Sans" rel="stylesheet">

<link rel="stylesheet" href="main.css"/>
</head>
<body>

	<header class="pageHeader">
		yesenintoxa@gmail.com
	</header>
	<main id="app"></main>
	
	<script   src="https://code.jquery.com/jquery-3.1.1.js" integrity="sha256-16cdPddA6VdVInumRGo6IbivbERE8p7CQR3HzTBuELA=" crossorigin="anonymous"></script>
	<script src="https://unpkg.com/react@latest/dist/react.js"></script>
    <script src="https://unpkg.com/react-dom@latest/dist/react-dom.js"></script>
    <script src="https://unpkg.com/babel-standalone@6.15.0/babel.min.js"></script>

	<script type="text/babel">
		var seasons = [];
		var tables = [];
		
		$.getJSON('http://yesenin.github.io/yepl/seasons.json', function(data) {
			seasons = data.seasons;
			$.getJSON('http://yesenin.github.io/yepl/tables.json',
			//$.getJSON('http://yesenin.github.io/yepl/one_table.json',
			function(data) {
				tables = data.tables;
				ReactDOM.render(<App />, document.getElementById('app'));
			});
		});
		
		class SeasonCaption extends React.Component {
			
			render() {
				return <li className={this.props.bar} onClick={this.props.onClick}>{this.props.caption}</li>;
			}
		}
		
		class SeasonCaptionList extends React.Component {
			constructor(props) {
				super(props);
				this.state = {
					activeSeason: seasons[0]
				};
			}
			foo(s) {
				this.setState({activeSeason: s});
				$('html, body').animate({
			        scrollTop: $(".table[data-name='" + s + "']").offset().top
			    }, 500);
			}
			render() {
				const seasonList = seasons.map((season) => <SeasonCaption bar={season==this.state.activeSeason ? 'active' : ''} caption={season} onClick={() => this.foo(season)} key={season}/>);
				return <aside><ul>{seasonList}</ul></aside>
			}
		}
		
		class TableHeader extends React.Component {
			render() {
				return <header><ul>
					<li></li>
					<li>Points</li>
					<li>Goals diff</li>
					<li>Goals for</li>
					<li>Goals against</li>
					<li>Won</li>
					<li>Drawn</li>
					<li>Lost</li>
				</ul></header>
			}
		}
		
		
		class TableRow extends React.Component {
			render() {
				return <ul>
					<li>{this.props.item.team}</li>
					<li className="number-cell">{this.props.item.points}</li>
					<li className="number-cell">{this.props.item.goals_diff}</li>
					<li className="number-cell">{this.props.item.goals_for}</li>
					<li className="number-cell">{this.props.item.goals_against}</li>
					<li className="number-cell">{this.props.item.won}</li>
					<li className="number-cell">{this.props.item.drawn}</li>
					<li className="number-cell">{this.props.item.lost}</li>
				</ul>
			}
		}
		
		class Table extends React.Component {
			render() {
				const rows = this.props.item.table.map((row) => <TableRow item={row} key={row.team}/>);
				return <section className="table" data-name={this.props.item._id}>
						<h1>{this.props.item._id}</h1>
						<TableHeader />
						{rows}
					</section>
			}
		}
		
		class TableList extends React.Component {
			render() {
				const tableList = tables.map((table) => <div className="tableSection" key={table._id}><Table item={table} /></div>);
				return <section>{tableList}</section>;
			}
		}
		
		class App extends React.Component {
			render() {
				return <article>
					<SeasonCaptionList />
					<TableList />
				</article>
			}
		}
	</script>
</body>
</html>
