<html>
<head>
	<meta charset="utf-8">
	<title>Nummer</title>
	<style>
		body {
			font-family: sans-serif;
			font-weight: 100%;
		}
		
		.wrapper {
			width: 100%;
		}
		
		#numbers {
			margin-top: 100px;
			padding: 20px;
			font-size: 30pt;
			text-align: center;
		}
		
		#words {
			padding: 20px;
			font-size: 30pt;
			text-align: center;
			display: none;
		}
		
		#wordsButton {
			
		}
		
		.button-wrapper {
			text-align: center;
		}
		
		.button {
			display: inline-block;
			width: 300px;
			font-size: 30pt;
			padding: 20px;
			background-color: #3399ff;
			color: white;
		}
		
		.bottom {
			margin-top: 40px;
		}
		
		.word {
			padding: 5px;
		}
		
		#first {
			color: #666;
			
		}
		
		#second {
			color: #aaa;
		}
		
		#third {
			color: #999;
		}
	</style>
</head>
<body>
<div class="wrapper">
	<div><a href="http://yesenin.github.io/svenska/">Main</a></div>
	<div id="numbers"></div>
	<div id="words"></div>
	<div class="button-wrapper" id="wordsButton"><span class="button" onclick="showWords()">Visa</span></div>
	<div class="button-wrapper"><span class="button bottom" onclick="next()">Nästa</span></div>
</div>
<script language="javascript">	

	var dict = {
		0 : "noll",
		1 : "ett",
		2 : "två",
		3 : "tre",
		4 : "fyra",
		5 : "fem",
		6 : "sex",
		7 : "sju",
		8 : "åtta",
		9 : "nio",
		10 : "tio",
		11 : "elva",
		12 : "tolv",
		13 : "tretton",
		14 : "fjorton",
		15 : "femton",
		16 : "sexton",
		17 : "sjuton",
		18 : "arton",
		19 : "nitton",
		20 : "tjugo",
		30 : "trettio",
		40 : "fyrtio",
		50 : "femtio",
		60 : "sextio",
		70 : "sjuttio",
		80 : "åttio",
		90 : "nittio",
		100: "hundra"
	};
	
	var ops = {
		'+': {
			word: 'plus',
			action: function(a, b) {
				return a + b;
			}
		},
		'−': {
			word: 'minus',
			action: function(a, b) {
				return a - b;
			}
		}
	};
	
	setValue = function(value, id) {
		var el = document.getElementById(id);
		el.innerText = value;
	}
	
	wordsForNumber = function(number) {
		var digits = []
		while (number > 0) {
			digits.push(number % 10);
			number = Math.floor(number / 10);
		}
		if (digits[1] == 1) {
			digits[1] = digits[1] * 10 + digits[0];
			digits[0] = 0;
		}
		var text = '';
		if (digits[2] > 0) {
			text += dict[digits[2]] + dict[100];
		}
		if (digits[1] > 9) {
			text += dict[digits[1]];
		}
		else if (digits[1] > 0) {
			text += dict[digits[1] * 10];
		}
		if (digits[0] > 0) {
			text += dict[digits[0]];
		}
		return text;
	}

	function nextNumbers() {
		var a = Math.floor(Math.random() * 100) + 1;
		var b = Math.floor(Math.random() * a) + 1;
		var op = Object.keys(ops)[Math.floor(Math.random() * 2)];
		var c = ops[op].action(a, b);
		
		var numbersText = a + ' ' + op + ' ' + b + ' = ...';
		setValue(numbersText, 'numbers');
		var firstWord = wordsForNumber(a);
		var wordsText = firstWord[0].toUpperCase() + firstWord.slice(1) + ' ' + ops[op].word + ' ' + wordsForNumber(b) + ' är lika med ' + wordsForNumber(c);
		setValue(wordsText, 'words');
	}
	
	window.onload = function(){
		nextNumbers();
	}
	
	function showWords() {
		var wordsDiv = document.getElementById('words');
		var wordsButtonDiv = document.getElementById('wordsButton');
		wordsButtonDiv.style.display = 'none';
		wordsDiv.style.display = 'block';
	}
	
	function hideWords() {
		var wordsDiv = document.getElementById('words');
		var wordsButtonDiv = document.getElementById('wordsButton');
		wordsButtonDiv.style.display = 'block';
		wordsDiv.style.display = 'none';
	}
	
	function next() {
		hideWords();
		nextNumbers();
	}
</script>
</body>
</html>
