<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css?family=PT+Serif" rel="stylesheet">
<style>
	body {
			font-family: 'PT Serif', serif;
		}
		
	.table {
		margin: 50px 0;
		display: table;
		margin-left: auto;
		margin-right: auto;
		font-size: 22pt;
	}
	
	.header {
		display: table-header-group;
	}
	.header-item {
		display: table-cell;
		width: 150px;
		font-size: 20pt;
		text-align: center;
		color: grey;
		padding: 10px;
		border-bottom: 1px black solid;
	}
	.content {
		display: table-row;
	}
	.content-item {
		display: table-cell;
		width: 150px;
		text-align: center;
		padding: 5px;
	}
	
	.hidden {
		opacity: 0;
	}
	
	.button-wrapper {
			text-align: center;
			margin: 10px 0;
		}
		.button {
			display: inline-block;
			width: 300px;
			font-size: 30pt;
			padding: 20px;
			background-color: #3399ff;
			color: white;
			cursor: pointer;
		}


</style>
</head>
<body>
	<div class="table" id="table">
		<div class="header">
			<div class="header-item">infinitiv</div>
			<div class="header-item">presens</div>
			<div class="header-item">preteritum</div>
			<div class="header-item">supinum</div>
		</div>
		
	</div>

<script>
	var data = {"verbs":[{"infinitiv":"göra","presens":"gör","preteritum":"gjorde","supinum":"gjort","translation":"делать"},{"infinitiv":"vara","presens":"är","preteritum":"var","supinum":"varit","translation":"быть"},{"infinitiv":"finnas","presens":"finns","preteritum":"fanns","supinum":"funnits","translation":"находиться"},{"infinitiv":"ha","presens":"har","preteritum":"hade","supinum":"haft","translation":"иметь"},{"infinitiv":"ta","presens":"tar","preteritum":"tog","supinum":"tagit","translation":"брать"},{"infinitiv":"komma","presens":"kommer","preteritum":"kom","supinum":"kommit","translation":"приходить"},{"infinitiv":"gå","presens":"går","preteritum":"gick","supinum":"gått","translation":"идти"},{"infinitiv":"dricka","presens":"dricker","preteritum":"drack","supinum":"druckit","translation":"пить"},{"infinitiv":"äta","presens":"äter","preteritum":"åt","supinum":"ätit","translation":"есть"},{"infinitiv":"se","presens":"ser","preteritum":"såg","supinum":"sett","translation":"видеть"},{"infinitiv":"ge","presens":"ger","preteritum":"gav","supinum":"gett","translation":"давать"},{"infinitiv":"springa","presens":"springer","preteritum":"sprang","supinum":"sprungit","translation":"бежать"},{"infinitiv":"stiga","presens":"stiger","preteritum":"steg","supinum":"stigit","translation":"вставать"},{"infinitiv":"skriva","presens":"skriver","preteritum":"skrev","supinum":"skrivit","translation":"писать"}]};
	
	var options = ["infinitiv", "presens", "preteritum", "supinum"];
	
	var html = '<div class="content"><div class="content-item">#infinitiv</div><div class="content-item">#presens</div><div class="content-item">#preteritum</div><div class="content-item">#supinum</div></div>';
	var makeTable = function() {
		var result = '';
		for (var i in data['verbs']) {
			result += html.replace('#infinitiv', data.verbs[i].infinitiv).replace('#presens', data.verbs[i].presens).replace('#preteritum', data.verbs[i].preteritum).replace('#supinum', data.verbs[i].supinum);
		}
		document.getElementById('table').innerHTML += result;
	}
	
	window.onload = function() {
		makeTable();
	}

</script>
</body>
</html>
