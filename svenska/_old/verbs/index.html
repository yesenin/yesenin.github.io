<html>
<head>
<meta charset="utf-8">
<title>Verbs</title>
<link href="https://fonts.googleapis.com/css?family=PT+Serif" rel="stylesheet">
<style>
		body {
			font-family: 'PT Serif', serif;
		}
		.button-wrapper {
			text-align: center;
			margin: 10px 0;
		}
		.button {
			display: inline-block;
			width: 300px;
			font-size: 30pt;
			padding: 20px;
			background-color: #3399ff;
			color: white;
			cursor: pointer;
		}
		.back-button {
			display: inline-block;
			width: 300px;
			font-size: 20pt;
			padding: 10px;
			background-color: #ccc;
			color: white;
			text-align: center;
			cursor: pointer;
		}
		
		.back-button a {
			text-decoration: none;
			color: #000;
		}
		
		.back-button a:hover {
			text-decoration: none;
			color: #000;
		}
		
		#question {
			padding: 20px;
			font-size: 30pt;
			text-align: center;
		}
		
		#answer {
			padding: 20px;
			font-size: 30pt;
			text-align: center;
			color: blue;
			display: none;
		}
</style></head>
<body>
	<div>
		<div><a href="http://yesenin.github.io/svenska/"><span class="back-button">Meny</span></a></div>
		<div id="question"></div>
		<div id="answer"></div>
		<div class="button-wrapper" id="showButton">
			<span class="button" onClick="showAnswer()">Visa</span>
		</div>
		<div class="button-wrapper">
			<span class="button" onClick="nextQuestion()">Nästa</span>
		</div>
	</div>
<script>
	var data = JSON.parse(  '{"verbs":[{"infinitiv":"göra","presens":"gör","preteritum":"gjorde","supinum":"gjort","translation":"делать"},{"infinitiv":"vara","presens":"är","preteritum":"var","supinum":"varit","translation":"быть"},{"infinitiv":"finnas","presens":"finns","preteritum":"fanns","supinum":"funnits","translation":"находиться"},{"infinitiv":"ha","presens":"har","preteritum":"hade","supinum":"haft","translation":"иметь"},{"infinitiv":"ta","presens":"tar","preteritum":"tog","supinum":"tagit","translation":"брать"},{"infinitiv":"komma","presens":"kommer","preteritum":"kom","supinum":"kommit","translation":"приходить"},{"infinitiv":"gå","presens":"går","preteritum":"gick","supinum":"gått","translation":"идти"},{"infinitiv":"dricka","presens":"dricker","preteritum":"drack","supinum":"druckit","translation":"пить"},{"infinitiv":"äta","presens":"äter","preteritum":"åt","supinum":"ätit","translation":"есть"},{"infinitiv":"se","presens":"ser","preteritum":"såg","supinum":"sett","translation":"видеть"},{"infinitiv":"ge","presens":"ger","preteritum":"gav","supinum":"gett","translation":"давать"},{"infinitiv":"springa","presens":"springer","preteritum":"sprang","supinum":"sprungit","translation":"бежать"},{"infinitiv":"stiga upp","presens":"stiger upp","preteritum":"steg upp","supinum":"stigit upp","translation":"вставать"},{"infinitiv":"skriva","presens":"skriver","preteritum":"skrev","supinum":"skrivit","translation":"писать"},{"infinitiv":"frysa","presens":"fryser","preteritum":"frös","supinum":"frusit","translation":"замерзать"}]}');
	
	var options = ["infinitiv", "presens", "preteritum", "supinum", "translation"];
	var optionsStr = ["Infinitiv är ", "Presens är ", "Preteritum är ", "Supinum är ", "translation"];
	var optionsStrA = ["Vad är infinitiv?", "Vad är presens?", "Vad är preteritum?", "Vad är supinum?", "translation"];
	
	var nextQuestion = function() {
		hideAnswer();
		var v = Math.floor(Math.random() * data['verbs'].length);
		var q = Math.floor(Math.random() * 4);
		var a = Math.floor(Math.random() * 4);
		while (a == q) {
			a = Math.floor(Math.random() * 4);
		}
		var question = optionsStr[q] + '"' + data['verbs'][v][options[q]] + '".<br>' + optionsStrA[a];
		var answer = data['verbs'][v][options[a]];
		document.getElementById('question').innerHTML = question;
		document.getElementById('answer').innerHTML = answer;
	}
	
	var showAnswer = function() {
		document.getElementById('answer').style.display = 'block';
		document.getElementById('showButton').style.display = 'none';
	}
	var hideAnswer = function() {
		document.getElementById('answer').style.display = 'none';
		document.getElementById('showButton').style.display = 'block';
	}
	
	window.onload = function() {
		nextQuestion();
	}
</script>
</body>
</html>
