		var phrase = dict[i];
		setValue('Vad heter "' + phrase.ru + '" på svenska?', 'ruWords');
		var wordsText = phrase.sv[0].toUpperCase() + phrase.sv.slice(1);
		setValue(wordsText, 'svWords');
