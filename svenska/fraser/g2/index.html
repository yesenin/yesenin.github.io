	setValue = function(value, id) {
		var el = document.getElementById(id);
		el.innerText = value;
	}
	
	var elDict = {
		1: 'first',
		2: 'second',
		3: 'third'
	}
	
	var count = {
		right: 0,
		wrong: 0
	}
	
	var answered;
	var check = function(i) {
		if (!answered) {
			var list = [1, 2, 3];
			if (i == selectedIndex) {
				count.right++;
				setValue("Det är rätt", 'message');
			} else {
				count.wrong++;
				setValue("Det är fel", 'message');
			}
			
			setValue(count.right, 'right');
			setValue(count.wrong, 'wrong');
			
			var index = list.indexOf(selectedIndex);
			list.splice(index, 1);
			
			document.getElementById(elDict[selectedIndex]).className += " right";
			for (var j in list) {
				document.getElementById(elDict[list[j]]).className += " wrong";
			}
			document.getElementById(elDict[i]).className += " selected";
			answered = true;
		}
	}
	
	var selectedIndex;
	
	
	
	function nextWords() {
		answered = false;
		document.getElementById(elDict[1]).className = "button";
		document.getElementById(elDict[2]).className = "button";
		document.getElementById(elDict[3]).className = "button";
		
		setValue("", 'first');
		setValue("", 'second');
		setValue("", 'third');
		
		var list = [1, 2, 3];
		
		var selectedWord = dict[Math.floor(Math.random()*dict.length)];
		setValue(selectedWord.ru, 'ruWords');
		selectedIndex = Math.floor(Math.random()*3) + 1;
		setValue(selectedWord.sv, elDict[selectedIndex]);
		
		var index = list.indexOf(selectedIndex);
		list.splice(index, 1);
		
	
		var foo = [];
		for (var j in list) {
			var k;
			do {
				k = Math.floor(Math.random()*dict.length);
			} while(k == selectedIndex || foo.indexOf(k) >= 0);
			foo.push(k);
			setValue(dict[k].sv, elDict[list[j]]);
		}
		setValue("", 'message');
	}
