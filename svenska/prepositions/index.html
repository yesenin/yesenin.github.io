<html>
<head>
<meta charset="utf-8">
<title>Prepositioner</title>
<link href="https://fonts.googleapis.com/css?family=PT+Serif" rel="stylesheet">
<style>
	body {
		font-family: 'PT Serif', serif;
	}
	.button-wrapper {
		text-align: center;
		margin: 10px 0;
	}
	.button {
		display: inline-block;
		width: 300px;
		font-size: 30pt;
		padding: 20px;
		background-color: #3399ff;
		color: white;
		cursor: pointer;
	}
	.back-button {
		display: inline-block;
		width: 300px;
		font-size: 20pt;
		padding: 10px;
		background-color: #ccc;
		color: white;
		text-align: center;
		cursor: pointer;
	}
	
	.back-button a {
		text-decoration: none;
		color: #000;
	}
	
	.back-button a:hover {
		text-decoration: none;
		color: #000;
	}
	
	#question {
		padding: 20px;
		font-size: 30pt;
		text-align: center;
	}
	
	#answer {
		margin-bottom: 10px;
		font-size: 20pt;
		text-align: center;
		height: 50px;
	}
	
	.button-small {
		width: 150px;
		font-size: 24pt;
		margin: 10px 20px;
		padding: 5px;
		color: black;
		background-color: #cceeff;
	}
	
	.right {
		color: #33cc33;
	}
	
	.wrong {
		color: #ff3333;
	}
	i {
		display: inline-block;
		heigh: auto;
		padding: 0 10px;
		min-width: 50px;
		color: #3399ff;
		font-style: normal;
	}
</style>
</head>
<body>
<div>
	<div><a href="http://yesenin.github.io/svenska/"><span class="back-button">Meny</span></a></div>
	<div id="question"></div>
	<div id="answer" class=""></div>
	<div class="button-wrapper" id="foo">
		<span class="button button-small" onClick="check(this.innerText)" id="op1"></span>
		<span class="button button-small" onClick="check(this.innerText)" id="op2"></span>
		<span class="button button-small" onClick="check(this.innerText)" id="op3"></span>
	</div>
	
	<div class="button-wrapper">
		<span class="button" onClick="nextQuestion()">Nästa</span>
	</div>
</div>
<script>
	var data = [
		{'q': 'Kan du öppna dörr <i id="a"></i> rummet?', 'a': 'till'},
		{'q': 'Vad tittar du <i id="a"></i>?', 'a': 'på'}
	]
	var answer = '';
	var allOption = ['i', 'om', 'till', 'på'];
	var nextQuestion = function() {
		document.getElementById('answer').innerHTML = '';
		document.getElementById('answer').className = '';
		var q = Math.floor(Math.random() * data.length);
		answer = data[q]['a'];
		document.getElementById('question').innerHTML = data[q]['q'];
		var options = [answer];
		var op1 = Math.floor(Math.random() * allOption.length);
		while(options.indexOf(allOption[op1]) >= 0) {
			op1 = Math.floor(Math.random() * allOption.length);
		}
		options.push(allOption[op1]);
		var op2 = Math.floor(Math.random() * allOption.length);
		while(options.indexOf(allOption[op2]) >= 0) {
			op2 = Math.floor(Math.random() * allOption.length);
		}
		options.push(allOption[op2]);
		shuffle(options);
		document.getElementById('op1').innerHTML = options[0];
		document.getElementById('op2').innerHTML = options[1];
		document.getElementById('op3').innerHTML = options[2];
		
	}
	
	var check = function(e) {
		if (e === answer) {
			document.getElementById('answer').innerHTML = ':-)';
			document.getElementById('answer').className = 'right';
		} else {
			document.getElementById('answer').innerHTML = ':-(';
			document.getElementById('answer').className = 'wrong';
		}
		document.getElementById('a').innerHTML = answer;
	}
	
	function shuffle(a) {
		var j, x, i;
		for (i = a.length; i; i--) {
			j = Math.floor(Math.random() * i);
			x = a[i - 1];
			a[i - 1] = a[j];
			a[j] = x;
		}
	}
	
	window.onload = function() {
		nextQuestion();
	}
</script>
</body>
</html>
