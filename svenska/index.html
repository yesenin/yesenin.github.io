<html>
<head>
	<meta charset="utf-8">
	<title>Svenska</title>
	<link href="https://fonts.googleapis.com/css?family=PT+Serif" rel="stylesheet">
	<style>
		body {
			font-family: 'PT Serif', serif;
		}
		
		.wrapper {
			width: 100%;
		}
		
		.header {
			margin-top: 30px;
			text-align: center;
			padding: 10px;
		}
		
		.list {
			list-style-type: none;
			
		}
		
		.list li {
			display: inline-block;
		}
		
		.list span {
			width: 200px;
			margin: 5px;
			padding: 20px;
			background-color: #3399ff;
			cursor: pointer;
		}
		
		.list a {
			text-decoration: none;
			color: #fff;
		}
		
		.list a:hover {
			text-decoration: none;
			color: #fff;
		}
	</style>
</head>
<body>
<div class="header"><h1>Svenska</h1>
<h3>Meny</h3></div>
<div class="wrapper">
	<ul class="list">
		<li><a href ="./nummer/"><span>Nummer</span></a></li>
		<li><a href ="./fraser/"><span>Fraser</span></a></li>
		<li><a href ="./fraser/o/"><span>Oppna fraser</span></a></li>
		<li><a href ="./tid/"><span>Tid</span></a></li>
		<li><a href ="./fraser/o/"><span>Svenska → Ryska</span></a></li>
		<li><a href ="./fraser/o/"><span>Ryska → Svenska</span></a></li>
	</ul>
</div>
</body>
</html>
