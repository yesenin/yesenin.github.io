<html>
<head>
	<style>
		body {
			font-size: 16pt;
		}
		p {
			margin: 10px 0;
		}
		#text {
			width: 600px;
		}
		.word {
			margin: 1px 2px;
			display: inline-block;
			padding: 2px;
		}
		.hide {
			color: white;
			border: 1px black solid;
		}
		.hide:hover {
			color: blue;
		}
	</style>
</head>
<body>
	<div id="text">
	</div>
	<script>
		var text = { lines: [
			"Familjen Malmsjö ser en annons om en våning att hyra. Herr Malmsjö ringer:",
			"— Goddag. Det är med anledning av annonsen om våning. Är våningen upptagen?",
			"— Nej, den är ledig. Jag ska åka till England och stanna där ett år, så jag vill hyra ut våningen.",
			"— Jaha.",
			"— Det är två stora rum och ett litet rum, ett kök och ett badrum. Det är en bra våning!",
			"— Det låter bra. Hur stor är hyran?",
			"— 7000 kronor för ett år. Har ni några barn?",
			"— Ja, vi har två flickor — en är ett år och en är fem år. Jag skulle gärna vilja se våningen. Passar det idag?",
			"— Ja, det passar bra. Kan ni komma klockan fyra?",
			"— Det går bra. Mitt namn är Malmsjö.",
			"— Jag heter Frosberg. Adressen är Kyrkvägen, 17, tre tappor. Ni är välkommen klockan fyra.",
			"— Ja tack. Adjö, adjö.",
			"— Adjö."
		]}
		
		window.onload = function(){
		
			var content = '';
			if (location.hash === '') {
				for (var i in text.lines) {
					var foo = text.lines[i].split(' ');
					var bar = foo.map(function(word) {
						var isHidden = Math.random() > 0.7 ? ' hide' : '';
						var style = 'word' + isHidden;
						return '<span class="' + style + '">' + word + '</span>';
					});
					bar = '<p>' + bar.join('') + '</p>';
					content += bar;
				}
			} else {
				for (var i in text.lines) {
					var foo = text.lines[i].split(' ');
					var bar = foo.map(function(word) {
						var style = 'word';
						return '<span class="' + style + '">' + word + '</span>';
					});
					bar = '<p>' + bar.join('') + '</p>';
					content += bar;
				}
			}
			document.getElementById('text').innerHTML = content;
			
		}
	</script>
</body>
</html>
