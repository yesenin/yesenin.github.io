<html>
<head>
	<meta charset="utf-8">
	<title>Tid</title>
	<link href="https://fonts.googleapis.com/css?family=PT+Serif" rel="stylesheet">
	<style>
		body {
			font-family: 'PT Serif', serif;
		}
		
		.wrapper {
			width: 100%;
		}
		
		#ruWords {
			margin-top: 100px;
			padding: 20px;
			font-size: 30pt;
			text-align: center;
		}
		
		#svWords {
			padding: 20px;
			font-size: 30pt;
			text-align: center;
			display: none;
		}
		
		#wordsButton {
			
		}
		
		.button-wrapper {
			text-align: center;
		}
		
		.button {
			display: inline-block;
			width: 300px;
			font-size: 30pt;
			padding: 20px;
			background-color: #3399ff;
			color: white;
			cursor: pointer;
		}
		
		.bottom {
			margin-top: 40px;
		}
		
		.word {
			padding: 5px;
		}
		
		#first {
			color: #666;
			
		}
		
		#second {
			color: #aaa;
		}
		
		#third {
			color: #999;
		}
		.back-button {
			display: inline-block;
			width: 300px;
			font-size: 20pt;
			padding: 10px;
			background-color: #ccc;
			color: white;
			text-align: center;
			cursor: pointer;
		}
		
		.back-button a {
			text-decoration: none;
			color: #000;
		}
		
		.back-button a:hover {
			text-decoration: none;
			color: #000;
		}
	</style>
</head>
<body>
<div class="wrapper">
	<div><a href="http://yesenin.github.io/svenska/"><span class="back-button">Meny</span></a></div>
	<div id="ruWords"></div>
	<div id="svWords"></div>
	<div class="button-wrapper" id="wordsButton"><span class="button" onclick="showWords()">Visa<br/><span style="text-align: center; margin: 10px; color: #ddd; font-size: 10pt;"><a href="#" onclick="showWords()">Ctrl + ↑</a></span></span></div>
	
	<div class="button-wrapper"><span class="button bottom" onclick="next()">Nästa<br/><span style="text-align: center; margin: 10px; color: #ddd; font-size: 10pt;"><a href="#" onclick="next()">Ctrl + →</a></span></span></div>
	
</div>
<script language="javascript">	

	var dict = {
		0 : "noll",
		1 : "ett",
		2 : "två",
		3 : "tre",
		4 : "fyra",
		5 : "fem",
		6 : "sex",
		7 : "sju",
		8 : "åtta",
		9 : "nio",
		10 : "tio",
		11 : "elva",
		12 : "tolv",
		13 : "tretton",
		14 : "fjorton",
		15 : "femton",
		16 : "sexton",
		17 : "sjuton",
		18 : "arton",
		19 : "nitton",
		20 : "tjugo",
		30 : "trettio",
		40 : "fyrtio",
		50 : "femtio",
		60 : "sextio",
		70 : "sjuttio",
		80 : "åttio",
		90 : "nittio",
		100: "hundra"
	};
	
	wordsForNumber = function(number) {
		var digits = []
		while (number > 0) {
			digits.push(number % 10);
			number = Math.floor(number / 10);
		}
		if (digits[1] == 1) {
			digits[1] = digits[1] * 10 + digits[0];
			digits[0] = 0;
		}
		var text = '';
		if (digits[2] > 0) {
			text += dict[digits[2]] + dict[100];
		}
		if (digits[1] > 9) {
			text += dict[digits[1]];
		}
		else if (digits[1] > 0) {
			text += dict[digits[1] * 10];
		}
		if (digits[0] > 0) {
			text += dict[digits[0]];
		}
		return text;
	}
	
	setValue = function(value, id) {
		var el = document.getElementById(id);
		el.innerText = value;
	}

	function nextWords() {
		var hours = Math.floor(Math.random()*12) + 1;
		var minutes = Math.floor(Math.random()*60);
		var minutesStr = minutes + "";
		minutesStr = minutesStr.length == 1 ? "0" + minutesStr : minutesStr;
		setValue("— Vad är klockan?\n — " + hours + ":" + minutesStr, 'ruWords');
		
		var minutesWords = wordsForNumber(minutes);
		if (minutes == 30) minutesWords = "halv";
		if (minutes < 30) {
			if (minutes >= 23) {
				minutesWords = wordsForNumber(30 - minutes) + " i halv ";
			}
			else {
				minutesWords = wordsForNumber(minutes) + " över ";
			}
			if (minutes == 15) {
				minutesWords = " kvart över ";
			}
		}
		if (minutes > 30) {
			
			if (minutes <= 37) {
				minutesWords = wordsForNumber(minutes - 30) + " över halv ";
			}
			else {
				minutesWords = wordsForNumber(60 - minutes) + " i ";
				hours += 1;
			}
			if (minutes == 45) {
				minutesWords = " kvart i ";
				hours += 1;
			}
		}
		if (minutes == 0) minutesWords = " klockan ";
		if (hours > 12) hours = 1;
		var hoursWords = wordsForNumber(hours);
		setValue("— Hon är " + minutesWords + " " + hoursWords, 'svWords');
	}
	
		
	function hideWords() {
		var wordsDiv = document.getElementById('svWords');
		var wordsButtonDiv = document.getElementById('wordsButton');
		wordsButtonDiv.style.display = 'block';
		wordsDiv.style.display = 'none';
	}
	
	function showWords() {
		var wordsDiv = document.getElementById('svWords');
		var wordsButtonDiv = document.getElementById('wordsButton');
		wordsButtonDiv.style.display = 'none';
		wordsDiv.style.display = 'block';
	}
	
	document.body.onkeydown = function(e) {
		if (e.ctrlKey) {
			e.preventDefault();
			if (e.keyCode == 39) {
				next();
			}
			if (e.keyCode == 38) {
				showWords();
			}
		}
	}
	
	window.onload = function(){
		nextWords();
	}
	
	function next() {
		hideWords();
		nextWords();
	}
</script>
</body>
</html>
