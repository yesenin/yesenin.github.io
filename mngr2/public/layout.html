<!doctype html>
<html lang="en">
    <head>
        <style>
            main {
                display: flex;
                justify-content: space-between;
                flex-direction: row;
            }

            .menu {
                background-color: red;
                flex-grow: 1;
            }
            .tree {
                background-color: green;
                flex-grow: 1;
            }
            .list {
                background-color: blue;
                flex-grow: 3;
            }

            .list .content {
                display: flex;
            }

            .tree ul{
                list-style-type: none;
            }

            li .collapsed {
                background-color: white;
            }

            li .expanded {
                background-color: purple;
            }

            li .selected {
                background-color: yellow;
            }
            .note {
                width: 64px;
                text-align: center;
            }
            .note::before {
                content: '';
                position: relative;
                border: 1px black solid;
                width: 64px;
                height: 64px;
                background-color: black;
                margin: 10px;
            }
        </style>
    </head>
  <body>
    <header>Manager</header>
    <main>
        <div class="menu">
            <ul>
                <li>Add</li>
                <li>Add</li>
                <li>Remove</li>
            </ul>
        </div>
        <div class="tree">
            <ul>
                <li class="collapsed">Corparative</li>
                <li class="expanded">Private
                    <ul>
                        <li class="expanded selected">Family</li>
                        <li class="collapsed">Passwords</li>
                        </ul>
                </li>
                <li class="collapsed">Other activites</li>
            </ul>
        </div>
        <div class="list">
            <div><input type="text" placeholder="Search"/></div>
            <div class="content">
                <div class="note">Future birthdays</div>
                <div class="note">Daily tasks</div>
                <div class="note">Budget</div>
            </div>
        </div>
    </main>
    <footer></footer>
  </body>
</html>
